<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Assistente de Vendas — Farmácias Nuvi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --green-muted: #9FE1CB;
    --bg: #F7F8F6;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --text-light: #9CA3AF;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --red-bg: #FCEBEB;
    --red-text: #791F1F;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* TOPBAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 14px;
    flex-shrink: 0;
  }
  .topbar-title { font-weight: 600; font-size: 15px; }
  .topbar-sub { font-size: 12px; color: var(--text-muted); }
  .topbar-badge {
    margin-left: auto;
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* MAIN LAYOUT */
  .main { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* TABS */
  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab {
    padding: 8px 18px;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    transition: all .15s;
  }
  .tab:hover { border-color: var(--green); color: var(--green); }
  .tab.active { background: var(--green); color: white; border-color: var(--green); }

  /* API KEY PANEL */
  .api-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .api-panel .field { flex: 1; }
  .api-panel label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; font-weight: 500; }
  .api-input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .api-input:focus { outline: none; border-color: var(--green); }
  .api-save {
    padding: 9px 18px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .api-save:hover { background: var(--green-dark); }
  .api-status { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .api-status.ok { color: var(--green-dark); }

  /* SEARCH */
  .search-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .search-input:focus { outline: none; border-color: var(--green); background: white; }
  .search-btn {
    padding: 12px 22px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s;
    white-space: nowrap;
  }
  .search-btn:hover { background: var(--green-dark); }
  .search-btn:disabled { background: var(--green-muted); cursor: not-allowed; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 13px;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    background: var(--bg);
    transition: all .12s;
  }
  .chip:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

  /* THINKING */
  .thinking {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .dots { display: flex; gap: 5px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  /* RESULT */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .result-query {
    font-size: 12px;
    color: var(--text-muted);
    padding-bottom: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .result-query span { color: var(--text); }
  .ai-note {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
    padding: 10px 14px;
    background: var(--green-light);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--green);
    margin-bottom: 12px;
  }

  /* PRODUCT CARDS */
  .prod-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-top: 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    transition: border-color .12s;
  }
  .prod-card:hover { border-color: var(--green-muted); }
  .prod-card.first { border-color: var(--green); background: #FAFFFE; }
  .prod-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .prod-sku { font-size: 11px; color: var(--text-light); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .prod-just { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge {
    font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 10px;
    display: inline-block;
  }
  .b-marca { background: var(--blue-bg); color: var(--blue-text); }
  .b-gen { background: #EAF3DE; color: #27500A; }
  .b-ind { background: var(--amber-bg); color: var(--amber-text); }
  .b-prio {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
  }
  .b-prio.first { border-color: var(--green); color: var(--green-dark); }

  /* ALERTS */
  .alert {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-top: 8px;
    line-height: 1.5;
  }
  .alert-warn { background: var(--amber-bg); color: var(--amber-text); }
  .alert-danger { background: var(--red-bg); color: var(--red-text); }

  /* SORTIMENTO TAB */
  .sort-panel { display: none; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .sort-filter {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    margin-bottom: 10px;
  }
  .sort-filter:focus { outline: none; border-color: var(--green); }
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: 500px;
    overflow-y: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty-icon {
    width: 48px; height: 48px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 22px;
  }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .api-panel { flex-direction: column; }
    .topbar-badge { display: none; }
  }
</style>
</head>

</div>

const CHIPS_LIST = ["Dor de cabeça","Tosse","Diarreia","Malária","Hemorroidas","Alergia","Verminose","Dor muscular","Tensão alta","Candidíase","Gripe","Diabetes"];

function init() {
  renderChips();
}

function renderChips() {
  document.getElementById('chips').innerHTML = CHIPS_LIST.map(s =>
    `<span class="chip" onclick="useChip('${s}')">${s}</span>`
  ).join('');
}

function useChip(v) { document.getElementById('qi').value = v; go(); }

function sw(t) {
  document.getElementById('busca-panel').style.display = t === 'busca' ? '' : 'none';
  document.getElementById('sort-panel').style.display = t === 'sort' ? 'block' : 'none';
  document.getElementById('tb-busca').className = 'tab' + (t === 'busca' ? ' active' : '');
  document.getElementById('tb-sort').className = 'tab' + (t === 'sort' ? ' active' : '');
  if (t === 'sort') renderSortTable(SORT);
}

function renderSortTable(data) {
  const tipoMap = {M:'Marca', G:'Genérico', I:'Indiano'};
  const cls = {M:'b-marca', G:'b-gen', I:'b-ind'};
  const body = document.getElementById('sort-body');
  body.innerHTML = data.slice(0, 300).map(r => `<tr>
    <td style="color:#9CA3AF;font-family:'DM Mono',monospace;font-size:11px">${r[0]}</td>
    <td title="${r[1]}">${r[1]}</td>
    <td><span class="badge ${cls[r[4]]}">${tipoMap[r[4]]}</span></td>
    <td title="${r[2]}" style="color:#6B7280">${r[2]}</td>
  </tr>`).join('') +
  (data.length > 300 ? `<tr><td colspan="4" style="text-align:center;padding:10px;color:#9CA3AF;font-size:12px">+${data.length-300} mais — filtra para ver</td></tr>` : '');
}

function filterSort() {
  const q = document.getElementById('sort-q').value.toLowerCase();
  renderSortTable(q ? SORT.filter(r => r[1].toLowerCase().includes(q) || r[2].toLowerCase().includes(q) || r[3].toLowerCase().includes(q)) : SORT);
}

async function go() {
  const q = document.getElementById('qi').value.trim();
  if (!q) return;
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'A consultar...';
  document.getElementById('res').innerHTML = `<div class="thinking"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>IA a analisar o sortimento...</span></div>`;

  const sortTxt = SORT.map(r => `SKU:${r[0]}|${r[1]}|Cat:${r[2]}|Sub:${r[3]}|Tipo:${r[4]==='I'?'Indiano':r[4]==='G'?'Genérico':'Marca'}`).join('\n');

  const prompt = `És um assistente de apoio a vendas de farmácia em Angola. O colaborador no balcão tem um utente com: "${q}".

Sortimento disponível (farmácias Nuvi, Angola):
${sortTxt}

Responde APENAS em JSON válido sem markdown:
{"resumo_clinico":"explicação breve da condição para o colaborador (2-3 frases simples)","recomendacoes":[{"sku":"SKU exacto","nome_produto":"nome exacto do produto","justificacao":"porque serve este produto (1 frase)","prioridade":"1ª escolha|alternativa|complementar"}],"alertas":["alerta clínico importante se necessário"],"nao_disponivel":"descrição se nenhum produto do sortimento for adequado"}
Inclui apenas produtos do sortimento. Máx 4 recomendações. Ordena por prioridade.`;

  try {
    const resp = await fetch('https://nuvi-farmacia.onrender.com/consultar', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch(e) {
      document.getElementById('res').innerHTML = `<div class="result-card"><pre style="font-size:13px;white-space:pre-wrap">${raw}</pre></div>`;
      return;
    }
    renderRes(q, parsed);
  } catch(e) {
    document.getElementById('res').innerHTML = `<div class="result-card"><div class="alert alert-danger">Erro: ${e.message}</div></div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Consultar IA';
  }
}

function renderRes(q, r) {
  const tipoMap = {M:'Marca', G:'Genérico', I:'Indiano'};
  const tipoCls = {M:'b-marca', G:'b-gen', I:'b-ind'};
  let html = `<div class="result-card">
    <div class="result-query">Consulta: <span>${q}</span></div>`;
  if (r.resumo_clinico) html += `<div class="ai-note">${r.resumo_clinico}</div>`;

  if (r.recomendacoes?.length) {
    r.recomendacoes.forEach((rec, i) => {
      const prod = SORT.find(p => p[0] === String(rec.sku)) ||
                   SORT.find(p => p[1].toLowerCase().includes((rec.nome_produto||'').toLowerCase().split(' ')[0]));
      const tc = prod ? tipoCls[prod[4]] : '';
      const tn = prod ? tipoMap[prod[4]] : '—';
      const isFirst = i === 0;
      html += `<div class="prod-card ${isFirst ? 'first' : ''}">
        <div>
          <div class="prod-name">${rec.nome_produto}</div>
          <div class="prod-sku">SKU ${rec.sku || '—'}</div>
          <div class="badges">
            <span class="badge ${tc}">${tn}</span>
            <span class="badge b-prio ${isFirst ? 'first' : ''}">${rec.prioridade || ''}</span>
          </div>
          <div class="prod-just">${rec.justificacao || ''}</div>
        </div>
        <div style="text-align:right;font-size:11px;color:#9CA3AF;padding-top:2px">${prod ? prod[2] : ''}</div>
      </div>`;
    });
  }

  if (r.nao_disponivel) html += `<div class="alert alert-warn" style="margin-top:10px">Sem produto adequado no sortimento: ${r.nao_disponivel}</div>`;
  if (r.alertas?.length) r.alertas.forEach(a => { html += `<div class="alert alert-danger" style="margin-top:6px">Alerta: ${a}</div>`; });
  html += '</div>';
  document.getElementById('res').innerHTML = html;
}

init();
</script>
</body>
</html>
