<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>+Saúde — Assistente de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--teal:#1DB89A;--teal-light:#E0F5F1;--teal-dark:#0F8C74;--teal-muted:#8FD9CC;--pink:#E8335A;--pink-light:#FDE8ED;--pink-dark:#B5213F;--bg:#F4F6F5;--surface:#FFFFFF;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);--text:#1A1A1A;--text-muted:#6B7280;--text-light:#9CA3AF;--radius:14px;--radius-sm:9px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.logo-icon{width:38px;height:38px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-main{font-size:18px;font-weight:700;color:var(--teal);letter-spacing:-0.3px}
.logo-main span{color:var(--pink)}
.logo-sub{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:1px}
.topbar-badge{margin-left:auto;background:var(--teal-light);color:var(--teal-dark);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.main{max-width:760px;margin:0 auto;padding:1.5rem 1rem 3rem}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.tab{padding:8px 18px;border:1.5px solid var(--border-strong);border-radius:20px;background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);transition:all .15s}
.tab:hover{border-color:var(--teal);color:var(--teal)}
.tab.active{background:var(--teal);color:white;border-color:var(--teal)}
.search-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-input{flex:1;padding:12px 16px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--teal);background:white}
.search-btn{padding:12px 22px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;transition:background .15s;white-space:nowrap}
.search-btn:hover{background:var(--teal-dark)}
.search-btn:disabled{background:var(--teal-muted);cursor:not-allowed}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 13px;border:1.5px solid var(--border-strong);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);background:var(--bg);transition:all .12s}
.chip:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.thinking{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;color:var(--text-muted);font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1rem}
.dots{display:flex;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.question-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--teal);border-radius:var(--radius);padding:1.25rem;margin-bottom:10px;animation:fadeIn .25s ease}
.question-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--teal-dark);margin-bottom:8px}
.question-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:14px;line-height:1.5}
.answer-btns{display:flex;flex-wrap:wrap;gap:8px}
.answer-btn{padding:9px 18px;border:1.5px solid var(--border-strong);border-radius:20px;background:var(--bg);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .15s}
.answer-btn:hover{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark)}
.answer-btn.selected{background:var(--teal);color:white;border-color:var(--teal)}
.ver-rec-wrap{text-align:center;padding:1rem 0}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.result-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.result-query-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);margin-bottom:3px}
.result-query-val{font-size:15px;font-weight:600;color:var(--text)}
.nova-btn{padding:6px 14px;border:1.5px solid var(--border-strong);border-radius:20px;background:transparent;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text-muted);white-space:nowrap;transition:all .12s;flex-shrink:0}
.nova-btn:hover{border-color:var(--pink);color:var(--pink)}
.ai-note{font-size:13px;color:var(--text-muted);line-height:1.65;padding:10px 14px;background:var(--teal-light);border-radius:var(--radius-sm);border-left:3px solid var(--teal);margin-bottom:12px}
.context-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.context-pill{padding:3px 10px;background:var(--pink-light);color:var(--pink-dark);border-radius:10px;font-size:11px;font-weight:500}
.prod-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-top:8px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;transition:border-color .12s}
.prod-card:hover{border-color:var(--teal-muted)}
.prod-card.first{border-color:var(--teal);background:#FAFFFE}
.prod-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.prod-sku{font-size:11px;color:var(--text-light);font-family:'DM Mono',monospace;margin-bottom:6px}
.prod-just{font-size:13px;color:var(--text-muted);line-height:1.5;margin-top:6px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:10px;display:inline-block}
.b-marca{background:#EFF6FF;color:#1E40AF}.b-gen{background:#F0FDF4;color:#166534}.b-ind{background:#FFFBEB;color:#78350F}
.b-prio{background:transparent;border:1.5px solid var(--border-strong);color:var(--text-muted)}
.b-prio.first{border-color:var(--teal);color:var(--teal-dark)}
.prod-cat{font-size:11px;color:var(--text-light);text-align:right;padding-top:2px}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px;line-height:1.5}
.alert-warn{background:#FEF3C7;color:#78350F}.alert-danger{background:#FEE2E2;color:#7F1D1D}
.sort-panel{display:none}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-val{font-size:24px;font-weight:700;color:var(--teal)}
.stat-lbl{font-size:12px;color:var(--text-muted);margin-top:3px}
.sort-filter{width:100%;padding:10px 14px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);margin-bottom:10px}
.sort-filter:focus{outline:none;border-color:var(--teal)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}.topbar-badge{display:none}.search-btn{padding:12px 14px;font-size:13px}}
</style>
</head>

const CHIPS_LIST=["Dor de cabeça","Tosse","Diarreia","Malária","Hemorroidas","Alergia","Verminose","Dor muscular","Tensão alta","Candidíase","Gripe","Diabetes"];
let estado={sintoma:'',respostas:{},perguntas:[]};

function init(){renderChips();}
function renderChips(){
  document.getElementById('chips').innerHTML=CHIPS_LIST.map(s=>`<span class="chip" onclick="useChip('${s}')">${s}</span>`).join('');
}
function useChip(v){document.getElementById('qi').value=v;iniciarConsulta();}
function sw(t){
  document.getElementById('busca-panel').style.display=t==='busca'?'':'none';
  document.getElementById('sort-panel').style.display=t==='sort'?'block':'none';
  document.getElementById('tb-busca').className='tab'+(t==='busca'?' active':'');
  document.getElementById('tb-sort').className='tab'+(t==='sort'?' active':'');
  if(t==='sort')renderSortTable(SORT);
}
function renderSortTable(data){
  const tm={M:'Marca',G:'Genérico',I:'Indiano'},cls={M:'b-marca',G:'b-gen',I:'b-ind'};
  document.getElementById('sort-body').innerHTML=data.slice(0,300).map(r=>`<tr><td style="color:#9CA3AF;font-family:'DM Mono',monospace;font-size:11px">${r[0]}</td><td title="${r[1]}">${r[1]}</td><td><span class="badge ${cls[r[4]]}">${tm[r[4]]}</span></td><td style="color:#6B7280" title="${r[2]}">${r[2]}</td></tr>`).join('')+(data.length>300?`<tr><td colspan="4" style="text-align:center;padding:10px;color:#9CA3AF;font-size:12px">+${data.length-300} mais</td></tr>`:'');
}
function filterSort(){
  const q=document.getElementById('sort-q').value.toLowerCase();
  renderSortTable(q?SORT.filter(r=>r[1].toLowerCase().includes(q)||r[2].toLowerCase().includes(q)):SORT);
}
function novaConsulta(){
  estado={sintoma:'',respostas:{},perguntas:[]};
  document.getElementById('res').innerHTML='';
  document.getElementById('qi').value='';
  document.getElementById('qi').focus();
}
async function iniciarConsulta(){
  const q=document.getElementById('qi').value.trim();
  if(!q)return;
  estado.sintoma=q;estado.respostas={};
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='A processar...';
  document.getElementById('res').innerHTML=`<div class="thinking"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>A preparar perguntas de triagem...</span></div>`;
  try{
    const prompt=`És assistente de vendas da farmácia +Saúde em Angola. Utente com: "${q}". Gera exactamente 2 perguntas de triagem rápida para o colaborador fazer ao utente, com opções de resposta curtas (máx 4 opções). Responde APENAS em JSON: {"perguntas":[{"id":"p1","pergunta":"...","opcoes":["...","..."]},{"id":"p2","pergunta":"...","opcoes":["...","..."]}]}`;
    const data=await chamarAPI([{role:'user',content:prompt}]);
    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){await recomendarDireto();return;}
    estado.perguntas=parsed.perguntas||[];
    renderPerguntas();
  }catch(e){
    document.getElementById('res').innerHTML=`<div class="result-card"><div class="alert alert-danger">Erro: ${e.message}</div></div>`;
  }finally{btn.disabled=false;btn.textContent='Consultar';}
}
function renderPerguntas(){
  let html='';
  estado.perguntas.forEach((p,i)=>{
    const resp=estado.respostas[p.id];
    html+=`<div class="question-card"><div class="question-label">Pergunta ${i+1} de ${estado.perguntas.length}</div><div class="question-text">${p.pergunta}</div><div class="answer-btns">${p.opcoes.map(op=>`<button class="answer-btn ${resp===op?'selected':''}" onclick="responder('${p.id}','${op.replace(/'/g,"\\'")}',this)">${op}</button>`).join('')}</div></div>`;
  });
  const todas=estado.perguntas.every(p=>estado.respostas[p.id]);
  if(todas) html+=`<div class="ver-rec-wrap"><button class="search-btn" onclick="recomendarComContexto()">Ver recomendação</button></div>`;
  document.getElementById('res').innerHTML=html;
}
function responder(id,opcao){
  estado.respostas[id]=opcao;
  renderPerguntas();
}
async function recomendarComContexto(){
  document.getElementById('res').innerHTML=`<div class="thinking"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>IA a analisar o sortimento...</span></div>`;
  const ctx=estado.perguntas.map(p=>`${p.pergunta} → ${estado.respostas[p.id]||'?'}`).join('\n');
  const sortTxt=SORT.map(r=>`SKU:${r[0]}|${r[1]}|${r[2]}|${r[3]}|${r[4]==='I'?'Indiano':r[4]==='G'?'Genérico':'Marca'}`).join('\n');
  const prompt=`Farmácia +Saúde Angola. Sintoma: "${estado.sintoma}". Contexto:\n${ctx}\n\nSortimento:\n${sortTxt}\n\nJSON: {"resumo_clinico":"...","recomendacoes":[{"sku":"...","nome_produto":"...","justificacao":"...","prioridade":"1ª escolha|alternativa|complementar"}],"alertas":[],"nao_disponivel":""}. Máx 4 produtos. Só do sortimento.`;
  try{
    const data=await chamarAPI([{role:'user',content:prompt}]);
    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderResultado(parsed);
  }catch(e){
    document.getElementById('res').innerHTML=`<div class="result-card"><div class="alert alert-danger">Erro: ${e.message}</div></div>`;
  }
}
async function recomendarDireto(){
  const sortTxt=SORT.map(r=>`SKU:${r[0]}|${r[1]}|${r[2]}|${r[3]}|${r[4]==='I'?'Indiano':r[4]==='G'?'Genérico':'Marca'}`).join('\n');
  const prompt=`Farmácia +Saúde Angola. Sintoma: "${estado.sintoma}". Sortimento:\n${sortTxt}\nJSON: {"resumo_clinico":"...","recomendacoes":[{"sku":"...","nome_produto":"...","justificacao":"...","prioridade":"1ª escolha|alternativa|complementar"}],"alertas":[],"nao_disponivel":""}`;
  const data=await chamarAPI([{role:'user',content:prompt}]);
  const raw=data.content?.find(b=>b.type==='text')?.text||'';
  renderResultado(JSON.parse(raw.replace(/```json|```/g,'').trim()));
}
function renderResultado(r){
  const tm={M:'Marca',G:'Genérico',I:'Indiano'},tc={M:'b-marca',G:'b-gen',I:'b-ind'};
  const pills=estado.perguntas.map(p=>estado.respostas[p.id]?`<span class="context-pill">${estado.respostas[p.id]}</span>`:'').join('');
  let html=`<div class="result-card"><div class="result-header"><div><div class="result-query-label">Consulta</div><div class="result-query-val">${estado.sintoma}</div></div><button class="nova-btn" onclick="novaConsulta()">Nova consulta</button></div>`;
  if(pills) html+=`<div class="context-pills">${pills}</div>`;
  if(r.resumo_clinico) html+=`<div class="ai-note">${r.resumo_clinico}</div>`;
  if(r.recomendacoes?.length){
    r.recomendacoes.forEach((rec,i)=>{
      const prod=SORT.find(p=>p[0]===String(rec.sku))||SORT.find(p=>p[1].toLowerCase().includes((rec.nome_produto||'').toLowerCase().split(' ')[0]));
      const t=prod?tc[prod[4]]:'';const n=prod?tm[prod[4]]:'—';const f=i===0;
      html+=`<div class="prod-card ${f?'first':''}"><div><div class="prod-name">${rec.nome_produto}</div><div class="prod-sku">SKU ${rec.sku||'—'}</div><div class="badges"><span class="badge ${t}">${n}</span><span class="badge b-prio ${f?'first':''}">${rec.prioridade||''}</span></div><div class="prod-just">${rec.justificacao||''}</div></div><div class="prod-cat">${prod?prod[2]:''}</div></div>`;
    });
  }
  if(r.nao_disponivel) html+=`<div class="alert alert-warn" style="margin-top:10px">Sem produto adequado: ${r.nao_disponivel}</div>`;
  if(r.alertas?.length) r.alertas.forEach(a=>{html+=`<div class="alert alert-danger" style="margin-top:6px">Alerta: ${a}</div>`;});
  html+='</div>';
  document.getElementById('res').innerHTML=html;
}
async function chamarAPI(messages){
  const resp=await fetch('/consultar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages})});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`Erro HTTP ${resp.status}`);}
  return resp.json();
}
init();
